server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}